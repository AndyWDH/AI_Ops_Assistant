<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试图表</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/echarts/5.4.3/echarts.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }
        #chart {
            width: 600px;
            height: 400px;
            margin: 0 auto;
        }
    </style>
</head>
<body>
    <h1 style="text-align: center;">测试图表显示</h1>
    <div id="chart"></div>
    
    <script>
        // 初始化图表
        var chart = echarts.init(document.getElementById('chart'));
        
        // 图表配置
        var option = {
            title: {
                text: '简单测试图表',
                left: 'center'
            },
            tooltip: {
                trigger: 'item'
            },
            legend: {
                orient: 'vertical',
                left: 'left'
            },
            series: [
                {
                    name: '测试数据',
                    type: 'pie',
                    radius: '50%',
                    data: [
                        {value: 1048, name: 'A'},
                        {value: 735, name: 'B'},
                        {value: 580, name: 'C'},
                        {value: 484, name: 'D'},
                        {value: 300, name: 'E'}
                    ],
                    emphasis: {
                        itemStyle: {
                            shadowBlur: 10,
                            shadowOffsetX: 0,
                            shadowColor: 'rgba(0, 0, 0, 0.5)'
                        }
                    }
                }
            ]
        };
        
        // 设置图表配置
        chart.setOption(option);
        
        // 响应式调整
        window.addEventListener('resize', function() {
            chart.resize();
        });
    </script>
</body>
</html>
